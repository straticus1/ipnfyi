apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipnfyi
  namespace: ipnfyi
  labels:
    app: ipnfyi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ipnfyi
  template:
    metadata:
      labels:
        app: ipnfyi
    spec:
      containers:
      - name: api
        image: node:20-alpine
        command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache git
          cd /app
          npm install
          node server.js
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: ipnfyi-config
        - secretRef:
            name: ipnfyi-secret
        volumeMounts:
        - name: app-code
          mountPath: /app
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

      initContainers:
      - name: clone-code
        image: alpine/git
        command:
        - /bin/sh
        - -c
        - |
          git clone https://github.com/straticus1/ipnfyi.git /app
          cd /app
          ls -la
        volumeMounts:
        - name: app-code
          mountPath: /app

      volumes:
      - name: app-code
        emptyDir: {}

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - arm64
                - aarch64
