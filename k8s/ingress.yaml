apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ipnfyi
  namespace: ipnfyi
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ipn.fyi
    - www.ipn.fyi
    secretName: ipnfyi-tls
  rules:
  - host: ipn.fyi
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ipnfyi-api
            port:
              number: 80
  - host: www.ipn.fyi
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ipnfyi-api
            port:
              number: 80
